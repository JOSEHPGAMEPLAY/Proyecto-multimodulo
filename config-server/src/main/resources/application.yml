server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          searchLocations: classpath:/config

management:
  endpoints:
    web:
      exposure:
        include: health, beans, metrics, info, env, prometheus
  endpoint:
    health:
      show-details: always